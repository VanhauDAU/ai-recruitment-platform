openapi: 3.0.3
info:
  title: ProCV API
  version: 1.0.0
  description: 'API cho nền tảng ProCV — CV Builder, phân tích CV, so khớp CV–Job
    và tuyển dụng. Dùng JWT: đăng nhập lấy access token rồi bấm "Authorize" và nhập
    "Bearer <access_token>".'
paths:
  /api/auth/avatar/:
    post:
      operationId: auth_avatar_create
      summary: Upload avatar người dùng vào storage nội bộ
      tags:
      - auth
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AvatarUploadRequestRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUser'
          description: ''
  /api/auth/change-email/:
    post:
      operationId: auth_change_email_create
      summary: Đổi địa chỉ email (reset xác thực và gửi lại link)
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeEmailRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangeEmailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangeEmailRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUser'
          description: ''
  /api/auth/login/:
    post:
      operationId: auth_login_create
      summary: Đăng nhập theo cổng (ứng viên / NTD / admin)
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginCredentialsRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginCredentialsRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginCredentialsRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResult'
          description: ''
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      summary: Đăng xuất phiên hiện tại (blacklist refresh token)
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequestRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
          description: ''
  /api/auth/logout-all/:
    post:
      operationId: auth_logout_all_create
      summary: Đăng xuất khỏi tất cả thiết bị của tài khoản hiện tại
      tags:
      - auth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutAllResponse'
          description: ''
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: |-
        GET: thông tin tài khoản hiện tại. PATCH: cập nhật họ tên + SĐT.

        Chỉ nhận PATCH (không PUT) vì chỉ sửa một phần hồ sơ; email không đổi ở đây.
      tags:
      - auth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUser'
          description: ''
    patch:
      operationId: auth_me_partial_update
      description: |-
        GET: thông tin tài khoản hiện tại. PATCH: cập nhật họ tên + SĐT.

        Chỉ nhận PATCH (không PUT) vì chỉ sửa một phần hồ sơ; email không đổi ở đây.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedProfileUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProfileUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProfileUpdateRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileUpdate'
          description: ''
  /api/auth/oauth/complete/:
    post:
      operationId: auth_oauth_complete_create
      summary: Đổi one_time_code (từ OAuth callback) lấy JWT
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthCompleteRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OAuthCompleteRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OAuthCompleteRequestRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthComplete'
          description: ''
  /api/auth/password/:
    post:
      operationId: auth_password_create
      summary: Đặt hoặc thay đổi mật khẩu của tài khoản đang đăng nhập
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordChangeResponse'
          description: ''
  /api/auth/password-reset/:
    post:
      operationId: auth_password_reset_create
      summary: Gửi email chứa link đặt lại mật khẩu
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequest'
          description: ''
  /api/auth/password-reset/confirm/:
    post:
      operationId: auth_password_reset_confirm_create
      summary: Đặt mật khẩu mới bằng token trong link
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetConfirm'
          description: ''
  /api/auth/password-reset/validate/:
    get:
      operationId: auth_password_reset_validate_retrieve
      description: Cho frontend biết nên hiện form đổi mật khẩu hay màn 'link đã hết
        hạn'.
      summary: Kiểm tra link đặt lại mật khẩu còn hiệu lực (không tiêu token)
      tags:
      - auth
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetValidate'
          description: ''
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountTokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AccountTokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AccountTokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountTokenRefresh'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
  /api/auth/register/email-availability/:
    post:
      operationId: auth_register_email_availability_create
      description: Rate-limited UX pre-check; RegisterSerializer remains the final
        authority.
      summary: Kiểm tra email có thể dùng để đăng ký
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterEmailAvailabilityRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterEmailAvailabilityRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterEmailAvailabilityRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterEmailAvailability'
          description: ''
  /api/auth/sessions/:
    get:
      operationId: auth_sessions_list
      summary: Danh sách thiết bị đang đăng nhập của tài khoản hiện tại
      tags:
      - auth
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuthSession'
          description: ''
  /api/auth/sessions/{session_id}/:
    delete:
      operationId: auth_sessions_destroy
      summary: Đăng xuất một thiết bị theo id phiên
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - auth
      responses:
        '204':
          description: No response body
  /api/auth/sessions/revoke-others/:
    post:
      operationId: auth_sessions_revoke_others_create
      summary: Đăng xuất khỏi các thiết bị khác (giữ thiết bị hiện tại)
      tags:
      - auth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRevokeOthers'
          description: ''
  /api/auth/two-factor/disable/confirm/:
    post:
      operationId: auth_two_factor_disable_confirm_create
      summary: Xác nhận mã để tắt xác minh hai bước
      tags:
      - auth-2fa
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorCodeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TwoFactorCodeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TwoFactorCodeRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUser'
          description: ''
  /api/auth/two-factor/disable/send/:
    post:
      operationId: auth_two_factor_disable_send_create
      summary: Gửi mã để tắt xác minh hai bước qua email
      tags:
      - auth-2fa
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorCodeSent'
          description: ''
  /api/auth/two-factor/employer/backup-codes/:
    post:
      operationId: auth_two_factor_employer_backup_codes_create
      summary: Sinh bộ mã dự phòng mới (chỉ hiển thị một lần)
      tags:
      - auth-2fa
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorLoginCodeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TwoFactorLoginCodeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TwoFactorLoginCodeRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUser'
          description: ''
  /api/auth/two-factor/employer/backup-codes/send/:
    post:
      operationId: auth_two_factor_employer_backup_codes_send_create
      summary: Gửi mã xác minh để sinh mã dự phòng
      tags:
      - auth-2fa
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorCodeSent'
          description: ''
  /api/auth/two-factor/employer/methods/:
    get:
      operationId: auth_two_factor_employer_methods_retrieve
      description: Status không chứa secret/hash và chỉ dùng cho workspace employer.
      summary: Trạng thái các phương thức MFA của nhà tuyển dụng
      tags:
      - auth-2fa
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerTwoFactorMethods'
          description: ''
  /api/auth/two-factor/employer/methods/disable/:
    post:
      operationId: auth_two_factor_employer_methods_disable_create
      description: Tắt email, TOTP hoặc recovery codes sau step-up bằng phương thức
        đang bật.
      summary: Tắt một phương thức MFA cụ thể
      tags:
      - auth-2fa
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployerTwoFactorMethodDisableRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmployerTwoFactorMethodDisableRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmployerTwoFactorMethodDisableRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUser'
          description: ''
  /api/auth/two-factor/employer/methods/disable/send/:
    post:
      operationId: auth_two_factor_employer_methods_disable_send_create
      description: Gửi email step-up để tắt một phương thức MFA của employer.
      summary: Gửi mã step-up để tắt một phương thức MFA
      tags:
      - auth-2fa
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployerTwoFactorMethodRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmployerTwoFactorMethodRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmployerTwoFactorMethodRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorCodeSent'
          description: ''
  /api/auth/two-factor/employer/totp/confirm/:
    post:
      operationId: auth_two_factor_employer_totp_confirm_create
      summary: Xác nhận mã TOTP để bật ứng dụng xác thực
      tags:
      - auth-2fa
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorCodeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TwoFactorCodeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TwoFactorCodeRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUser'
          description: ''
  /api/auth/two-factor/employer/totp/disable/:
    post:
      operationId: auth_two_factor_employer_totp_disable_create
      summary: Tắt TOTP sau khi xác minh step-up
      tags:
      - auth-2fa
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorLoginCodeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TwoFactorLoginCodeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TwoFactorLoginCodeRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUser'
          description: ''
  /api/auth/two-factor/employer/totp/setup/:
    post:
      operationId: auth_two_factor_employer_totp_setup_create
      summary: 'Khởi tạo TOTP: trả secret và otpauth URL để quét QR'
      tags:
      - auth-2fa
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerTotpSetup'
          description: ''
  /api/auth/two-factor/login/resend/:
    post:
      operationId: auth_two_factor_login_resend_create
      summary: Gửi lại mã xác minh đăng nhập hai bước
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorResendRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TwoFactorResendRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TwoFactorResendRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorLoginResend'
          description: ''
  /api/auth/two-factor/login/verify/:
    post:
      operationId: auth_two_factor_login_verify_create
      summary: Xác nhận mã và hoàn tất đăng nhập hai bước
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorChallengeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TwoFactorChallengeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TwoFactorChallengeRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorLoginTokens'
          description: ''
  /api/auth/two-factor/setup/confirm/:
    post:
      operationId: auth_two_factor_setup_confirm_create
      summary: Xác nhận mã để bật xác minh hai bước
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorCodeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TwoFactorCodeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TwoFactorCodeRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUser'
          description: ''
  /api/auth/two-factor/setup/send/:
    post:
      operationId: auth_two_factor_setup_send_create
      summary: Gửi mã để bật xác minh hai bước
      tags:
      - auth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorCodeSent'
          description: ''
  /api/auth/verify/confirm/:
    post:
      operationId: auth_verify_confirm_create
      summary: Xác nhận email bằng token trong link
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyConfirmRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyConfirmRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyConfirmRequestRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyConfirm'
          description: ''
  /api/auth/verify/send/:
    post:
      operationId: auth_verify_send_create
      summary: Gửi lại email xác thực cho tài khoản hiện tại
      tags:
      - auth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyResend'
          description: ''
  /api/blog/:
    get:
      operationId: blog_list
      description: Danh sách bài đã xuất bản. Lọc ?category=<slug>&tag=<slug>&q=<text>.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - blog
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPostListList'
          description: ''
  /api/blog/{slug}/:
    get:
      operationId: blog_retrieve
      description: Chi tiết bài viết theo slug; tăng lượt xem mỗi lần mở.
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - blog
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
          description: ''
  /api/blog/admin/uploads/:
    post:
      operationId: blog_admin_uploads_create
      description: |-
        Upload ảnh chèn trong nội dung bài (rich-text editor). Chỉ nhân viên biên tập.

        Trả về URL công khai để editor nhúng thẳng vào HTML `content`; ảnh nội dung
        lưu URL cuối cùng (khác thumbnail lưu storage key).
      summary: Tải ảnh dùng trong bài viết
      tags:
      - blog
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
