        captcha_token:
          type: string
          writeOnly: true
          minLength: 1
        portal:
          allOf:
          - $ref: '#/components/schemas/LoginCredentialsPortalEnum'
          writeOnly: true
        email:
          type: string
          writeOnly: true
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - captcha_token
      - email
      - password
