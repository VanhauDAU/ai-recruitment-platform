# Môi trường DEV: docker compose up
# Backend đọc backend/.env; DB_HOST/REDIS_URL bị override trỏ vào service nội bộ.
# Production: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_career_coach
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file: ./backend/.env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/1
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A config worker --loglevel=info
    env_file: ./backend/.env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/1
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: ./backend
    command: celery -A config beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file: ./backend/.env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/1
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - '5173:5173'
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api

volumes:
  pgdata:
  backend_media:
  frontend_node_modules:
