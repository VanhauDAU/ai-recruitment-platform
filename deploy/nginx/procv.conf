# Reverse proxy production: / -> frontend (nginx tĩnh), /api + /admin -> backend.
# TLS: thêm server block 443 + certbot khi có domain thật.

upstream backend_app {
    server backend:8000;
}
upstream frontend_app {
    server frontend:80;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://backend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static của Django admin (collectstatic)
    location /static/ {
        alias /srv/backend-static/;
        add_header Cache-Control "public, max-age=86400";
    }

    # Media local (chỉ dùng khi chưa bật R2)
    location /media/ {
        alias /srv/backend-media/;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
    }
}
