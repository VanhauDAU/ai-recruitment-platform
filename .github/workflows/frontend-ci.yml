name: Frontend CI

# Quality gate cho frontend: lint + unit test + build. Chạy khi PR/đẩy có đụng
# tới frontend hoặc chính workflow này.
on:
  push:
    branches: [main, 'feature/**', 'epic/**']
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

defaults:
  run:
    working-directory: frontend

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: API boundary (axios chỉ trong shared/api)
        working-directory: .
        run: bash scripts/check_api_boundary.sh

      - name: Feature boundary (không deep-import feature khác)
        working-directory: .
        run: bash scripts/check_feature_boundary.sh

      - name: Lint (oxlint)
        run: npm run lint

      - name: Unit tests (vitest)
        run: npm test

      - name: Build (vite)
        run: npm run build
